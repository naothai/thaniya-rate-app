<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>円→バーツ レート比較</title>
  <meta name="theme-color" content="#07101c" />
  <meta name="description" content="タニヤ周辺と主要両替所の円→バーツ公開レート比較" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-badge">THANIYA RATE</div>
        <h1>円 → バーツ</h1>
        <p class="subtitle">今日の公開レートを、スマホで一番見やすく。</p>
      </div>
    </header>

    <section class="hero-card">
      <div class="hero-label">今日のベストレート</div>
      <div class="hero-main">
        <div class="hero-rate" id="bestRate">-</div>
        <div class="hero-unit">THB / JPY</div>
      </div>

      <div class="hero-amount-wrap">
        <div class="hero-amount-box">
          <div class="small-label">入力金額で最大</div>
          <div class="hero-amount" id="bestAmount">-</div>
        </div>
        <div class="hero-amount-box">
          <div class="small-label">取得時刻</div>
          <div class="hero-time" id="fetchedAt">-</div>
        </div>
      </div>
    </section>

    <section class="calc-box">
      <div class="calc-label">円を入力</div>
      <div class="calc-input-row">
        <input id="yenInput" class="yen-input" type="number" inputmode="numeric" min="0" step="1000" value="10000" placeholder="10000" />
        <div class="yen-unit">円</div>
      </div>
      <div class="calc-help">入力した金額で、各両替所の受取額を自動計算します。</div>
    </section>

    <section class="toolbar">
      <div class="toggle-group">
        <button class="toggle-btn active" id="sortRateBtn" type="button">レート順</button>
        <button class="toggle-btn" id="sortDistanceBtn" type="button">近い順</button>
      </div>
      <button id="locateBtn" class="ghost-btn" type="button">現在地を取得</button>
    </section>

    <section class="location-status-wrap">
      <div class="location-status" id="locationStatus">現在地は未取得です</div>
    </section>

    <section class="section-head">
      <div>
        <div class="section-title">レート一覧</div>
        <div class="section-sub" id="status">読み込み中...</div>
      </div>
    </section>

    <section id="list" class="card-list"></section>
  </div>

  <div class="bottom-bar">
    <button id="reloadBtn" class="primary-btn">最新レートに更新</button>
  </div>

  <script src="/app.js"></script>
</body>
</html>
