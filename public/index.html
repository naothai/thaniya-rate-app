<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>タニヤ最強レート</title>

  <meta property="og:title" content="タニヤ最強レート">
  <meta property="og:description" content="今どこが一番得か3秒で分かる">
  <meta property="og:image" content="/og.png">
  <meta property="og:type" content="website">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="タニヤ最強レート">
  <meta name="twitter:description" content="今どこが一番得か3秒で分かる">
  <meta name="twitter:image" content="/og.png">

  <meta name="theme-color" content="#071326">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="タニヤレート">

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-180.png?v=2">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="shell">
    <header class="statusbar">
      <div class="status-time">9:41</div>
      <div class="status-icons">
        <span class="sig"></span>
        <span class="wifi"></span>
        <span class="battery"></span>
      </div>
    </header>

    <main class="app">
      <section class="hero">
        <div class="hero-title">👑 今日のベストレート</div>

        <div class="hero-grid">
          <div class="hero-left">
            <div class="hero-rate-row">
              <div id="bestRate" class="hero-rate small">取得中</div>
              <div class="hero-unit">THB / JPY</div>
            </div>
            <div id="bestAmount" class="hero-amount">取得中</div>
          </div>

          <div class="hero-right">
            <div class="hero-time-label">取得時刻</div>
            <div id="fetchedAt" class="hero-time-value">-</div>
            <button id="reloadBtn" class="hero-reload" type="button">↻ 更新</button>
          </div>
        </div>
      </section>

      <section class="controls">
        <div class="controls-label">入力金額（円）</div>

        <div class="controls-grid">
          <div class="amount-box">
            <input id="yenInput" type="number" inputmode="numeric" value="10000" min="1" step="100">
            <span class="amount-unit">円</span>
          </div>

          <div class="locate-box">
            <button id="locateBtn" class="locate-btn" type="button">📍 現在地を取得</button>
            <div id="locationStatus" class="location-status">位置情報：未取得</div>
          </div>
        </div>

        <div class="sort-tabs">
          <button id="sortRateBtn" class="sort-tab active" type="button">レート順</button>
          <button id="sortDistanceBtn" class="sort-tab" type="button">近い順</button>
          <button id="sortThaniyaBtn" class="sort-tab" type="button">タニヤ優先</button>
        </div>
      </section>

      <section class="list-head">
        <div class="list-title">レート一覧</div>
        <div id="status" class="list-status">読み込み中...</div>
      </section>

      <section id="list" class="cards"></section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-item active" type="button"><span class="nav-icon">📈</span><span class="nav-text">レート</span></button>
      <button class="nav-item" type="button"><span class="nav-icon">🗺️</span><span class="nav-text">マップ</span></button>
      <button class="nav-item" type="button"><span class="nav-icon">⭐</span><span class="nav-text">お気に入り</span></button>
      <button class="nav-item" type="button"><span class="nav-icon">🕘</span><span class="nav-text">履歴</span></button>
      <button class="nav-item" type="button"><span class="nav-icon">⚙️</span><span class="nav-text">設定</span></button>
    </nav>
  </div>

  <script src="/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/service-worker.js");
    }
  </script>
</body>
</html>
